steps:
  # Build the Docker image from the cloud_run/ subdirectory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/humana-failed-audit:$COMMIT_SHA
      - .           # build context is repo root (Dockerfile lives here)

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/humana-failed-audit:$COMMIT_SHA

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - humana-failed-audit
      - --image=gcr.io/$PROJECT_ID/humana-failed-audit:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --timeout=3600
      - --concurrency=10
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/humana-failed-audit:$COMMIT_SHA
